version: "3"

services:
  traefik:
    image: "traefik:v3.1.2"
    logging:
      driver: local
    networks:
      - traefik-network
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik.yml:/etc/traefik/traefik.yml:ro"
      - "./letsencrypt:/letsencrypt:rw"

  #whoami:
  #  image: "traefik/whoami"
